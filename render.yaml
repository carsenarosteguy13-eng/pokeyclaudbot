services:
  - type: web
    name: pokemon-telegram-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: gunicorn -w 1 --chdir bot render_start:flask_app
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_REFRESH_TOKEN
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: SELLER_ZIP_CODE
        sync: false
